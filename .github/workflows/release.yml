name: Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ github.ref == 'refs/heads/main' }}

jobs:
  build:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: protomorph-linux-x86_64
            binary: protomorph
            archive_ext: tar.gz
          - os: macos-latest
            artifact: protomorph-macos-aarch64
            binary: protomorph
            archive_ext: tar.gz
          - os: windows-latest
            artifact: protomorph-windows-x86_64
            binary: protomorph.exe
            archive_ext: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev

      - name: Build release
        run: cargo build --release --features static

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p staging/${{ matrix.artifact }}
          cp target/release/${{ matrix.binary }} staging/${{ matrix.artifact }}/
          cp -r assets staging/${{ matrix.artifact }}/
          cp README.md staging/${{ matrix.artifact }}/

      - name: Archive (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          cd staging
          tar -czf ../${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Archive (zip)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          Set-Location staging
          Compress-Archive -Path ${{ matrix.artifact }} -DestinationPath ../${{ matrix.artifact }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  publish:
    name: Publish
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Dev rolling release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete dev --yes --cleanup-tag 2>/dev/null || true
          gh release create dev artifacts/* \
            --target "$GITHUB_SHA" \
            --prerelease \
            --title "Development Build" \
            --notes "Rolling build from \`main\`. Updated on every push.

          Commit: [\`${GITHUB_SHA::7}\`](https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA})
          Built: $(date -u +'%Y-%m-%d %H:%M UTC')

          > These builds are unsigned. macOS users may need \`xattr -d com.apple.quarantine\` on the binary; Windows users will see a SmartScreen warning."
